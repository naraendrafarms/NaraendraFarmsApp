name: DB Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MGMT: ${{ secrets.SUPABASE_MGMT_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Test create table
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os

          MGMT = os.environ["MGMT"]
          GH   = os.environ["GH_PAT"]
          REF  = "kjliulgpipqqwptinrrd"

          def sql(query, label):
              with open("/tmp/q.json","w") as f: json.dump({"query":query},f)
              r = subprocess.run(["curl","-s","-w","\nHTTP:%{http_code}","-X","POST",
                  f"https://api.supabase.com/v1/projects/{REF}/database/query",
                  "-H",f"Authorization: Bearer {MGMT}",
                  "-H","Content-Type: application/json",
                  "--data-binary","@/tmp/q.json"],capture_output=True,text=True,timeout=60)
              lines=r.stdout.strip().split("\n")
              status=lines[-1]; body="\n".join(lines[:-1])
              print(f"[{label}] {status}")
              print(f"  body: {body[:500]}")
              return status, body

          # Test 1: simple SELECT
          sql("SELECT 1 as ping", "SELECT 1")

          # Test 2: Check if uuid-ossp extension is available
          sql("SELECT * FROM pg_extension WHERE extname='uuid-ossp'", "CHECK uuid-ossp")

          # Test 3: Create extension
          sql("CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"", "CREATE EXTENSION")

          # Test 4: Simple create table
          sql("CREATE TABLE IF NOT EXISTS public.test_table (id uuid DEFAULT uuid_generate_v4() PRIMARY KEY, name text)", "CREATE TABLE")

          # Test 5: Check if table was created
          s, b = sql("SELECT COUNT(*) FROM public.test_table", "COUNT TEST TABLE")
          print(f"Table exists: {'yes' if '2' in s else 'no'}")

          # Test 6: Drop test table
          sql("DROP TABLE IF EXISTS public.test_table", "DROP TEST TABLE")

          # Test 7: Check existing tables
          s, b = sql("SELECT tablename FROM pg_tables WHERE schemaname='public' LIMIT 20", "LIST TABLES")
          print(f"Tables: {b[:500]}")

          # Post to issue
          body_text = f"SELECT 1: OK\nExtension: tested\nCreate table: tested"
          with open("/tmp/issue.json","w") as f:
              json.dump({"title":"DB Direct SQL Test","body":body_text},f)
          subprocess.run(["curl","-s","-X","POST",
              "https://api.github.com/repos/naraendrafarms/NaraendraFarmsApp/issues",
              "-H",f"Authorization: token {GH}","-H","Accept: application/vnd.github+json",
              "-H","Content-Type: application/json","--data-binary","@/tmp/issue.json"],
              capture_output=True,text=True)
          print("Done!")
          PYEOF
