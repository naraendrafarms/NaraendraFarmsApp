name: DB Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MGMT: ${{ secrets.SUPABASE_MGMT_TOKEN }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Test and report
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os

          MGMT = os.environ["MGMT"]
          GH   = os.environ["GH_PAT"]
          REF  = "kjliulgpipqqwptinrrd"
          results = []

          def sql(query, label):
              with open("/tmp/q.json","w") as f: json.dump({"query":query},f)
              r = subprocess.run(["curl","-s","-w","\nHTTP:%{http_code}","-X","POST",
                  f"https://api.supabase.com/v1/projects/{REF}/database/query",
                  "-H",f"Authorization: Bearer {MGMT}",
                  "-H","Content-Type: application/json",
                  "--data-binary","@/tmp/q.json"],capture_output=True,text=True,timeout=60)
              lines=r.stdout.strip().split("\n")
              status=lines[-1]; body="\n".join(lines[:-1])
              results.append(f"**{label}**: {status} | {body[:300]}")
              print(f"[{label}] {status} | {body[:300]}")
              return status, body

          sql("SELECT 1 as ping", "ping")
          sql("CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"", "uuid_ext")
          sql("CREATE EXTENSION IF NOT EXISTS \"pgcrypto\"", "pgcrypto")
          sql("CREATE TABLE IF NOT EXISTS public.farms (id uuid DEFAULT uuid_generate_v4() PRIMARY KEY, code text UNIQUE, name text)", "create_farms")
          s,b = sql("SELECT COUNT(*) as n FROM public.farms", "count_farms")
          sql("SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename", "list_tables")
          
          # Check the actual schema SQL file size and first 500 chars
          try:
              with open("supabase/migrations/001_schema.sql") as f: schema = f.read()
              results.append(f"**schema size**: {len(schema)} chars")
              results.append(f"**schema start**: {schema[:200]}")
          except Exception as e:
              results.append(f"**schema file**: ERROR {e}")

          body_text = "\n".join(results)
          with open("/tmp/issue.json","w") as f:
              json.dump({"title":"DB SQL Test Results","body":body_text},f)
          subprocess.run(["curl","-s","-X","POST",
              "https://api.github.com/repos/naraendrafarms/NaraendraFarmsApp/issues",
              "-H",f"Authorization: token {GH}","-H","Accept: application/vnd.github+json",
              "-H","Content-Type: application/json","--data-binary","@/tmp/issue.json"],
              capture_output=True,text=True)
          PYEOF
