name: Quick Query
on:
  workflow_dispatch:
jobs:
  query:
    runs-on: ubuntu-latest
    env:
      MGMT: ${{ secrets.SUPABASE_MGMT_TOKEN }}
      SK: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Query HE per flock and reload PostgREST
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os

          MGMT = os.environ["MGMT"]
          SK   = os.environ["SK"]
          GH   = os.environ["GH_PAT"]
          REF  = "kjliulgpipqqwptinrrd"

          def sql(q):
              with open("/tmp/q.json","w") as f: json.dump({"query":q},f)
              r=subprocess.run(["curl","-s","-X","POST",
                  f"https://api.supabase.com/v1/projects/{REF}/database/query",
                  "-H",f"Authorization: Bearer {MGMT}","-H","Content-Type: application/json",
                  "--data-binary","@/tmp/q.json"],capture_output=True,text=True,timeout=60)
              try: return json.loads(r.stdout)
              except: return r.stdout[:300]

          results = []

          # HE per flock
          he = sql("SELECT f.flock_no, COUNT(*) as cnt FROM public.he_dispatch h JOIN public.flocks f ON f.id=h.flock_id GROUP BY f.flock_no ORDER BY f.flock_no")
          results.append(f"HE per flock: {he}")

          # Total HE
          he2 = sql("SELECT COUNT(*) as total FROM public.he_dispatch")
          results.append(f"HE total: {he2}")

          # HE with NULL flock_id
          he3 = sql("SELECT COUNT(*) as null_flock FROM public.he_dispatch WHERE flock_id IS NULL")
          results.append(f"HE with NULL flock: {he3}")

          # Reload PostgREST schema cache
          reload = subprocess.run(["curl","-s","-X","POST",
              f"https://api.supabase.com/v1/projects/{REF}/database/schema-changes/reload",
              "-H",f"Authorization: Bearer {MGMT}",
              "-H","Content-Type: application/json"],
              capture_output=True,text=True,timeout=30)
          results.append(f"PostgREST reload: {reload.stdout[:200]}")

          # Also try via REST API directly
          reload2 = subprocess.run(["curl","-s","-X","POST",
              f"https://{REF}.supabase.co/rest/v1/",
              "-H",f"apikey: {SK}","-H",f"Authorization: Bearer {SK}",
              "-H","Content-Profile: pg_catalog"],
              capture_output=True,text=True,timeout=10)
          results.append(f"Direct reload: {reload2.stdout[:100]}")

          body = "\n".join(results)
          print(body)
          with open("/tmp/issue.json","w") as f:
              json.dump({"title":"HE Query + Cache Reload","body":body},f)
          subprocess.run(["curl","-s","-X","POST",
              "https://api.github.com/repos/naraendrafarms/NaraendraFarmsApp/issues",
              "-H",f"Authorization: token {GH}","-H","Accept: application/vnd.github+json",
              "-H","Content-Type: application/json","--data-binary","@/tmp/issue.json"],
              capture_output=True,text=True)
          PYEOF
