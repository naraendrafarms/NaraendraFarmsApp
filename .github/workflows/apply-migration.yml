name: Apply Migration (No Data Loss)

# Applies schema changes to live DB without resetting data.
# Use this to add new functions, roles, or columns.
on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'Migration file (e.g. 003_management_role_and_functions.sql)'
        required: true
        default: '003_management_role_and_functions.sql'

jobs:
  migrate:
    name: Apply Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run migration
        run: python3 scripts/run_sql.py "supabase/migrations/${{ github.event.inputs.migration }}"
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Reload PostgREST schema cache
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os
          MGMT = os.environ.get("SUPABASE_MGMT_TOKEN", "")
          REF  = "kjliulgpipqqwptinrrd"
          with open("/tmp/q.json","w") as f:
              json.dump({"query":"SELECT pg_notify('pgrst','reload schema')"}, f)
          r = subprocess.run(["curl","-s","-X","POST",
              f"https://api.supabase.com/v1/projects/{REF}/database/query",
              "-H",f"Authorization: Bearer {MGMT}",
              "-H","Content-Type: application/json",
              "--data-binary","@/tmp/q.json"], capture_output=True, text=True)
          print("Cache reload:", r.stdout[:200])
          PYEOF
        env: { SUPABASE_MGMT_TOKEN: "${{ secrets.SUPABASE_MGMT_TOKEN }}" }

      - name: Done
        run: echo "Migration applied successfully — data is intact."
