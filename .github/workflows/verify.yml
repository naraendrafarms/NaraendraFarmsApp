name: Debug Database
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check DB tables
        run: |
          ANON="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          BASE="https://kjliulgpipqqwptinrrd.supabase.co/rest/v1"
          
          echo "## DB Results" >> $GITHUB_STEP_SUMMARY
          
          for T in farms flocks daily_records he_dispatch hatchability salary_abstract electricity_bills; do
            R=$(curl -s "${BASE}/${T}?select=id&limit=0" \
              -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}" \
              -H "Prefer: count=exact" -w "HTTPSTATUS:%{http_code}" 2>/dev/null)
            HDR=$(echo "$R" | grep -oE "content-range: [^,]+" | head -1 || echo "no header")
            echo "${T}: ${HDR}" >> $GITHUB_STEP_SUMMARY
            echo "${T}: ${HDR}"
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Farms" >> $GITHUB_STEP_SUMMARY
          FARMS=$(curl -s "${BASE}/farms?select=code,name" \
            -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}")
          echo "$FARMS" >> $GITHUB_STEP_SUMMARY
          echo "FARMS: $FARMS"
          
          echo "## Flocks" >> $GITHUB_STEP_SUMMARY
          FLOCKS=$(curl -s "${BASE}/flocks?select=flock_no,status" \
            -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}")
          echo "$FLOCKS" >> $GITHUB_STEP_SUMMARY
          echo "FLOCKS: $FLOCKS"
          
          echo "## MGMT API test" >> $GITHUB_STEP_SUMMARY
          MGMT=$(curl -s -X POST \
            "https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query" \
            -H "Authorization: Bearer ${SK}" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT COUNT(*) FROM daily_records"}')
          echo "MGMT: $MGMT" >> $GITHUB_STEP_SUMMARY
          echo "MGMT: $MGMT"
