name: Debug Database

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tables via REST API
        run: |
          ANON="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          BASE="https://kjliulgpipqqwptinrrd.supabase.co/rest/v1"
          
          echo "=== FARMS ==="
          curl -s "${BASE}/farms?select=code,name" -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}"
          
          echo ""
          echo "=== FLOCKS ==="
          curl -s "${BASE}/flocks?select=flock_no,status" -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}"
          
          echo ""
          echo "=== DAILY RECORDS COUNT ==="
          curl -si "${BASE}/daily_records?select=id&limit=1" -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}" -H "Prefer: count=exact"
          
          echo ""
          echo "=== HATCHABILITY COUNT ==="
          curl -si "${BASE}/hatchability?select=id&limit=1" -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}" -H "Prefer: count=exact"
          
          echo ""
          echo "=== SALARY COUNT ==="
          curl -si "${BASE}/salary_abstract?select=id&limit=1" -H "apikey: ${ANON}" -H "Authorization: Bearer ${ANON}" -H "Prefer: count=exact"

      - name: Test Supabase Management API
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          echo "=== MANAGEMENT API TEST ==="
          curl -s -X POST             "https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query"             -H "Authorization: Bearer ${SK}"             -H "Content-Type: application/json"             -d '"query": "SELECT COUNT(*) FROM daily_records"}'             -w "\nHTTP_STATUS:%{http_code}"

      - name: Test correct JSON format
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          echo "=== CORRECT FORMAT ==="
          echo '{"query":"SELECT COUNT(*) as cnt FROM public.daily_records"}' > /tmp/q.json
          cat /tmp/q.json
          curl -s -X POST             "https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query"             -H "Authorization: Bearer ${SK}"             -H "Content-Type: application/json"             -d @/tmp/q.json             -w "\nHTTP:%{http_code}"

      - name: Run small test INSERT
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          echo "=== TEST INSERT ==="
          python3 -c "
import json, subprocess
sql = \"SELECT COUNT(*) FROM public.daily_records; SELECT COUNT(*) FROM public.hatchability; SELECT COUNT(*) FROM public.electricity_bills;\"
payload = json.dumps({'query': sql})
r = subprocess.run(['curl','-s','-w','\\nHTTP:%{http_code}','-X','POST',
  'https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query',
  '-H',f'Authorization: Bearer ${SK}',
  '-H','Content-Type: application/json',
  '-d',payload],capture_output=True,text=True)
lines=r.stdout.strip().split('\\n')
print('HTTP:',lines[-1])
print('Body:','\\n'.join(lines[:-1])[:1000])
"
