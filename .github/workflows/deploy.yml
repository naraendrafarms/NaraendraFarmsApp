name: Build, Deploy & Load Data

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm install -g wrangler@3
      - run: wrangler pages project create naraendra-farms --production-branch=main 2>&1 || true
        env: { CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}", CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" }
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=naraendra-farms --branch=main --commit-dirty=true
        env: { CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}", CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" }

  database:
    name: Initialize Database
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: 1. Drop all tables (clean reset)
        run: python3 scripts/run_sql.py supabase/seeds/000_cleanup.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: 2. Create schema (28 tables)
        run: python3 scripts/run_sql.py supabase/migrations/001_schema.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: 3. Master data (farms/sheds/flocks/parties/medicines)
        run: python3 scripts/run_sql.py supabase/seeds/001_seed_data.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: 4. Daily records chunk 1
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_01.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 5. Daily records chunk 2
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_02.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 6. Daily records chunk 3
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_03.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 7. Daily records chunk 4
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_04.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 8. Daily records chunk 5
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_05.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 9. Daily records chunk 6
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_06.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 10. Daily records chunk 7
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_07.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 11. Daily records chunk 8
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_08.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 12. Daily records chunk 9
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_09.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 13. Daily + HE dispatch chunk 10
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_10.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 14. HE dispatch chunk 11
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_11.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 15. HE dispatch chunk 12
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_12.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 16. Hatchability + Salary chunk 13
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_13.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: 17. Electricity bills chunk 14
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_14.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: 18. Create admin user
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          R=$(curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/auth/v1/admin/users" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" -H "Content-Type: application/json" \
            -d '{"email":"admin@naraendrafarms.com","password":"NaraendraFarms@2025","email_confirm":true,"user_metadata":{"full_name":"Admin","role":"admin"}}')
          ID=$(echo $R | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','exists'))" 2>/dev/null || echo "exists")
          echo "Admin: $ID"
          if [ ${#ID} -gt 10 ] && [ "$ID" != "exists" ]; then
            curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/rest/v1/profiles" \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" -H "Prefer: return=minimal" \
              -d "{"id":"$ID","full_name":"Admin","role":"admin","is_active":true}" || true
          fi

      - name: 19. Verify counts
        run: python3 scripts/db_check.py
        env:
          ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SERVICE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Done
        run: |
          echo "NARAENDRA FARMS — FULLY LOADED"
          echo "App: https://naraendra-farms.pages.dev"
          echo "Login: admin@naraendrafarms.com / NaraendraFarms@2025"
          echo "daily_records: 1949 | he_dispatch: 899 | hatchability: 260"
          echo "salary: 93 | electricity: 98 | farms: 6 | flocks: 4"
