name: Build, Deploy & Setup Database

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Deploy and Initialize
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Create CF Pages project (skip if exists)
        run: wrangler pages project create naraendra-farms --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=naraendra-farms --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run Database Schema (idempotent - safe to run every time)
        run: |
          echo "Running database schema on Supabase..."
          PROJECT_REF="kjliulgpipqqwptinrrd"
          SERVICE_KEY="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          
          # Download schema SQL
          SCHEMA_SQL=$(cat supabase/migrations/001_schema.sql)
          SEED_SQL=$(cat supabase/seeds/001_seed_data.sql)
          
          # Run schema via Supabase Management API
          SCHEMA_RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SCHEMA_SQL" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")}")
          echo "Schema result: $(echo $SCHEMA_RESULT | tail -1)"
          
          # Run seed data
          SEED_RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SEED_SQL" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")}")
          echo "Seed result: $(echo $SEED_RESULT | tail -1)"

      - name: Create Admin User
        run: |
          PROJECT_REF="kjliulgpipqqwptinrrd"
          SERVICE_KEY="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"
          
          # Create admin user (skip if already exists)
          RESULT=$(curl -s -X POST \
            "${SUPABASE_URL}/auth/v1/admin/users" \
            -H "apikey: ${SERVICE_KEY}" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "email": "admin@naraendrafarms.com",
              "password": "NaraendraFarms@2025",
              "email_confirm": true,
              "user_metadata": {"full_name": "Admin", "role": "admin"}
            }')
          
          USER_ID=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id','already_exists'))" 2>/dev/null || echo "exists")
          echo "Admin user: $USER_ID"
          
          if [ "$USER_ID" != "already_exists" ] && [ "$USER_ID" != "exists" ] && [ -n "$USER_ID" ]; then
            # Insert profile
            curl -s -X POST \
              "${SUPABASE_URL}/rest/v1/profiles" \
              -H "apikey: ${SERVICE_KEY}" \
              -H "Authorization: Bearer ${SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"id\": \"${USER_ID}\", \"full_name\": \"Admin\", \"role\": \"admin\", \"is_active\": true}" || true
            echo "Profile created"
          fi

      - name: Deployment Summary
        run: |
          echo "=================================="
          echo "✅ DEPLOYMENT COMPLETE"
          echo "=================================="
          echo "App URL:  https://naraendra-farms.pages.dev"
          echo "Login:    admin@naraendrafarms.com"
          echo "Password: NaraendraFarms@2025"
          echo "=================================="
