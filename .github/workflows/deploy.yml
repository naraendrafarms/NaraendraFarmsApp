name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Verify CF Token & Create Project
        run: |
          echo "=== Verifying Cloudflare token ==="
          VERIFY=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "Token verify: $VERIFY"
          
          echo "=== Creating/checking Pages project ==="
          CREATE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"naraendra-farms","production_branch":"main"}')
          echo "Create result: $CREATE"
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload to Cloudflare Pages via API
        run: |
          echo "=== Uploading dist to CF Pages ==="
          # Create deployment via API  
          cd dist
          # List files
          echo "Files to deploy:"
          find . -type f | head -20
          
          # Use wrangler with verbose output
          npm install -g wrangler@3
          wrangler --version
          
          echo "=== Deploying ==="
          wrangler pages deploy . --project-name=naraendra-farms --branch=main --commit-dirty=true 2>&1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
