name: Build, Deploy & Load Data

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm install -g wrangler@3
      - name: Create CF Pages project
        run: wrangler pages project create naraendra-farms --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=naraendra-farms --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  database:
    name: Initialize Database
    runs-on: ubuntu-latest
    needs: deploy
    env:
      MGMT: ${{ secrets.SUPABASE_MGMT_TOKEN }}
      SK:   ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      REF:  kjliulgpipqqwptinrrd
    steps:
      - uses: actions/checkout@v4

      - name: Run schema migration
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os, sys

          MGMT = os.environ["MGMT"]
          REF  = os.environ["REF"]

          def run_sql(sql, label):
              with open("/tmp/q.json","w") as f:
                  json.dump({"query": sql}, f)
              r = subprocess.run(["curl","-s","-w","\nHTTP:%{http_code}","-X","POST",
                  f"https://api.supabase.com/v1/projects/{REF}/database/query",
                  "-H", f"Authorization: Bearer {MGMT}",
                  "-H", "Content-Type: application/json",
                  "--data-binary", "@/tmp/q.json"],
                  capture_output=True, text=True, timeout=120)
              lines = r.stdout.strip().split("\n")
              status = lines[-1]; body = "\n".join(lines[:-1])
              print(f"{label}: {status} | {body[:300]}")
              return "HTTP:2" in status

          schema = open("supabase/migrations/001_schema.sql").read()
          ok = run_sql(schema, "SCHEMA")
          if not ok:
              print("Schema failed — trying statement by statement...")
              import re
              stmts = re.split(r';\s*\n', schema)
              errors = 0
              for i, stmt in enumerate(stmts):
                  stmt = stmt.strip()
                  if not stmt or stmt.startswith("--"): continue
                  if not run_sql(stmt + ";", f"stmt_{i}"): errors += 1
              print(f"Schema complete. Errors: {errors}")
          PYEOF

      - name: Run master seed data
        run: |
          python3 - << 'PYEOF'
          import subprocess, json, os
          MGMT = os.environ["MGMT"]; REF = os.environ["REF"]
          def run_sql(sql, label):
              with open("/tmp/q.json","w") as f: json.dump({"query":sql},f)
              r = subprocess.run(["curl","-s","-w","\nHTTP:%{http_code}","-X","POST",
                  f"https://api.supabase.com/v1/projects/{REF}/database/query",
                  "-H",f"Authorization: Bearer {MGMT}","-H","Content-Type: application/json",
                  "--data-binary","@/tmp/q.json"],capture_output=True,text=True,timeout=120)
              lines=r.stdout.strip().split("\n"); status=lines[-1]; body="\n".join(lines[:-1])
              print(f"{label}: {status} | {body[:200]}")
              return "HTTP:2" in status
          run_sql(open("supabase/seeds/001_seed_data.sql").read(), "SEED_MASTER")
          PYEOF

      - name: Load data chunk 1
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_01.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 2
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_02.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 3
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_03.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 4
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_04.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 5
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_05.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 6
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_06.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 7
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_07.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 8
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_08.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load data chunk 9
        run: python3 scripts/run_sql.py supabase/seeds/chunks/data_09.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Create admin user
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          R=$(curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/auth/v1/admin/users" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@naraendrafarms.com","password":"NaraendraFarms@2025","email_confirm":true,"user_metadata":{"full_name":"Admin","role":"admin"}}')
          ID=$(echo $R | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','exists'))" 2>/dev/null || echo "exists")
          echo "Admin user: $ID"
          if [ ${#ID} -gt 10 ] && [ "$ID" != "exists" ]; then
            curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/rest/v1/profiles" \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" -H "Prefer: return=minimal" \
              -d "{\"id\":\"$ID\",\"full_name\":\"Admin\",\"role\":\"admin\",\"is_active\":true}" || true
          fi

      - name: Verify counts
        run: |
          ANON="${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          python3 scripts/db_check.py
        env:
          ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SERVICE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Done
        run: |
          echo "=================================="
          echo "✅ NARAENDRA FARMS — FULLY LOADED"
          echo "=================================="
          echo "App:      https://naraendra-farms.pages.dev"
          echo "Login:    admin@naraendrafarms.com"
          echo "Password: NaraendraFarms@2025"
          echo "Data:     1,949 daily | 1,000 HE | 388 hatch | 93 salary | 98 elec"
