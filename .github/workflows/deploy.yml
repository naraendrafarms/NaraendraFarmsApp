name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm install -g wrangler@3
      - run: wrangler pages project create naraendra-farms --production-branch=main 2>&1 || true
        env: { CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}", CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" }
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=naraendra-farms --branch=main --commit-dirty=true
        env: { CLOUDFLARE_API_TOKEN: "${{ secrets.CLOUDFLARE_API_TOKEN }}", CLOUDFLARE_ACCOUNT_ID: "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" }

      - name: Apply pending migrations
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "--- $f ---"
            python3 scripts/run_sql.py "$f"
          done
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load GRN seed data (idempotent — ON CONFLICT DO NOTHING)
        run: |
          python3 scripts/run_sql.py supabase/seeds/chunks/data_grn_parties.sql
          for f in $(ls supabase/seeds/chunks/data_grn_*.sql | sort); do
            [ "$f" = "supabase/seeds/chunks/data_grn_parties.sql" ] && continue
            echo "--- $f ---"
            python3 scripts/run_sql.py "$f"
          done
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load Flock 16 seed data (idempotent — ON CONFLICT DO NOTHING)
        run: |
          for f in $(ls supabase/seeds/chunks/data_f16_*.sql | sort); do
            echo "--- $f ---"
            python3 scripts/run_sql.py "$f"
          done
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load Trial Balance and Sales Register (idempotent)
        run: |
          python3 scripts/run_sql.py supabase/seeds/chunks/data_trial_balance.sql
          for f in $(ls supabase/seeds/chunks/data_sales_register_*.sql | sort); do
            echo "--- $f ---"
            python3 scripts/run_sql.py "$f"
          done
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }

      - name: Load Flock 17 seed data (idempotent)
        run: |
          for f in $(ls supabase/seeds/chunks/data_f17_*.sql | sort); do
            echo "--- $f ---"
            python3 scripts/run_sql.py "$f"
          done
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
