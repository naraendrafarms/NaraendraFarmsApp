name: Build, Deploy & Load Data

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm install -g wrangler@3
      - name: Create CF Pages project
        run: wrangler pages project create naraendra-farms --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=naraendra-farms --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  database:
    name: Initialize Database
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Run SQL helper
        run: |
          cat > /tmp/run_sql.py << 'PYEOF'
          import sys, json, subprocess, time
          sql = open(sys.argv[1]).read()
          skey = sys.argv[2]
          payload = json.dumps({"query": sql})
          with open('/tmp/payload.json','w') as f: f.write(payload)
          r = subprocess.run(['curl','-s','-w','\nHTTP:%{http_code}','-X','POST',
            'https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query',
            '-H',f'Authorization: Bearer {skey}',
            '-H','Content-Type: application/json',
            '--data-binary','@/tmp/payload.json'],
            capture_output=True,text=True,timeout=120)
          lines=r.stdout.strip().split('\n')
          status=lines[-1]; body='\n'.join(lines[:-1])
          print(f'{sys.argv[1]}: {status}')
          if 'HTTP:2' not in status:
            print(f'  Error: {body[:300]}')
          time.sleep(2)
          PYEOF

      - name: Schema + Master Data
        run: |
          python3 /tmp/run_sql.py supabase/migrations/001_schema.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          python3 /tmp/run_sql.py supabase/seeds/001_seed_data.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Data chunk 1 - Create tables + Daily F16 part 1
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_01.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 2 - Daily F16 part 2
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_02.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 3 - Daily F17
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_03.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 4 - Daily F19
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_04.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 5 - Daily F20
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_05.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 6 - HE Dispatch F16+F17
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_06.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 7 - HE Dispatch F19+F20
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_07.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 8 - Hatchability
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_08.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
      - name: Data chunk 9 - Salary + Electricity
        run: python3 /tmp/run_sql.py supabase/seeds/chunks/data_09.sql "${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Create Admin User
        run: |
          SK="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          R=$(curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/auth/v1/admin/users" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK" -H "Content-Type: application/json" \
            -d '{"email":"admin@naraendrafarms.com","password":"NaraendraFarms@2025","email_confirm":true,"user_metadata":{"full_name":"Admin","role":"admin"}}')
          ID=$(echo $R | python3 -c "import sys,json; print(json.load(sys.stdin).get('id','exists'))" 2>/dev/null || echo "exists")
          echo "User: $ID"
          if [ ${#ID} -gt 10 ] && [ "$ID" != "exists" ]; then
            curl -s -X POST "https://kjliulgpipqqwptinrrd.supabase.co/rest/v1/profiles" \
              -H "apikey: $SK" -H "Authorization: Bearer $SK" \
              -H "Content-Type: application/json" -H "Prefer: return=minimal" \
              -d "{\"id\":\"$ID\",\"full_name\":\"Admin\",\"role\":\"admin\",\"is_active\":true}" || true
          fi

      - name: Summary
        run: |
          echo "================================"
          echo "✅ NARAENDRA FARMS - FULLY LOADED"
          echo "================================"
          echo "App: https://naraendra-farms.pages.dev"
          echo "1,949 daily records loaded"
          echo "1,000 HE dispatch records"
          echo "388 hatchability records"
          echo "93 salary months"
          echo "98 electricity bills"
          echo "Login: admin@naraendrafarms.com / NaraendraFarms@2025"
