name: Run Pending Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install openpyxl -q
      - name: Run migration 024
        run: python3 scripts/run_sql.py supabase/migrations/024_payments_bank_ledger.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 025
        run: python3 scripts/run_sql.py supabase/migrations/025_po_receipts.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 026
        run: python3 scripts/run_sql.py supabase/migrations/026_payroll_extra.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 027
        run: python3 scripts/run_sql.py supabase/migrations/027_parties_dedup_extra.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 028
        run: python3 scripts/run_sql.py supabase/migrations/028_feedmill.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 029
        run: python3 scripts/run_sql.py supabase/migrations/029_formulas_vacc_schedule.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 030
        run: python3 scripts/run_sql.py supabase/migrations/030_fix_feedmill_tables.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 031
        run: python3 scripts/run_sql.py supabase/migrations/031_admin_delete_user.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 032
        run: python3 scripts/run_sql.py supabase/migrations/032_fix_admin_create_user.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 033
        run: python3 scripts/run_sql.py supabase/migrations/033_fix_auth_user_insert.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 034
        run: python3 scripts/run_sql.py supabase/migrations/034_fix_admin_create_user_v2.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 035
        run: python3 scripts/run_sql.py supabase/migrations/035_reload_schema.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 037
        run: python3 scripts/run_sql.py supabase/migrations/037_feedformula_feedtype_link.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 036
        run: python3 scripts/run_sql.py supabase/migrations/036_feed_stock_adjustments.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Reload PostgREST schema cache
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/database/query" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_MGMT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"NOTIFY pgrst, '\''reload schema'\''"}' && echo "Schema reloaded"
      - name: Restart Supabase services (fixes GoTrue auth errors)
        run: |
          curl -s -X POST "https://api.supabase.com/v1/projects/kjliulgpipqqwptinrrd/services/restart" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_MGMT_TOKEN }}" \
            -H "Content-Type: application/json" && echo "Services restarted"
      - name: Import NBF Excel PO data (all FY)
        run: python3 scripts/import_nbf_excel.py
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
