name: Run Pending Migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install openpyxl -q
      - name: Run migration 024
        run: python3 scripts/run_sql.py supabase/migrations/024_payments_bank_ledger.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 025
        run: python3 scripts/run_sql.py supabase/migrations/025_po_receipts.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Run migration 026
        run: python3 scripts/run_sql.py supabase/migrations/026_payroll_extra.sql
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
      - name: Import NBF Excel PO data (all FY)
        run: python3 scripts/import_nbf_excel.py
        env: { MGMT: "${{ secrets.SUPABASE_MGMT_TOKEN }}", REF: kjliulgpipqqwptinrrd }
